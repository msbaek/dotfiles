<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Explain</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f7f8fa; --bg-elev: #ffffff; --bg-elev-2: #f3f4f6;
  --border: #e5e7eb; --border-hi: #d1d5db;
  --text: #111827; --text-dim: #4b5563; --text-faint: #9ca3af;
  --summary-clr: #4f46e5; --glossary-clr: #0d9488; --info-clr: #0284c7;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.65; display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

/* sidebar */
aside { position: sticky; top: 0; max-height: 100vh; overflow-y: auto; background: var(--bg-elev); border-right: 1px solid var(--border); padding: 24px 18px; }
aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint); margin-bottom: 14px; font-weight: 600; }
aside h2:not(:first-child) { margin-top: 24px; }
aside ol { list-style: none; }
aside li { margin-bottom: 4px; }
aside a { color: var(--text-dim); text-decoration: none; font-size: 13px; display: flex; justify-content: space-between; padding: 7px 10px; border-radius: 6px; transition: background 0.15s, color 0.15s; }
aside a:hover { background: var(--bg-elev-2); color: var(--text); }
aside a.current { background: var(--bg-elev-2); color: var(--text); border-left: 2px solid var(--summary-clr); padding-left: 8px; }
.toggle-all { margin-top: 16px; }
.toggle-all button { width: 100%; background: var(--bg-elev-2); color: var(--text-dim); border: 1px solid var(--border); padding: 7px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--mono); transition: all 0.15s; text-align: left; }
.toggle-all button:hover { color: var(--text); border-color: var(--border-hi); }

/* main */
main { padding: 36px 56px 80px; max-width: 1100px; }
header.hero { margin-bottom: 36px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
header.hero h1 { font-size: 26px; margin-bottom: 10px; letter-spacing: -0.01em; }
header.hero .meta { font-size: 13px; color: var(--text-dim); font-family: var(--mono); }
header.hero .meta b { color: var(--text); }

/* sections */
section.s { margin-bottom: 56px; }
section.s > h2 { font-size: 21px; margin-bottom: 10px; }

/* summary callout */
.sec-summary { background: rgba(79,70,229,0.06); border: 1px solid rgba(79,70,229,0.2); border-left: 4px solid var(--summary-clr); border-radius: 8px; padding: 12px 18px; margin-bottom: 22px; font-size: 14px; color: var(--text); line-height: 1.6; }
.sec-summary::before { content: '📌 핵심'; display: block; font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--summary-clr); margin-bottom: 6px; letter-spacing: 0.05em; }

/* items */
.item { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 18px 22px; margin-bottom: 14px; box-shadow: var(--shadow-sm); transition: border-color 0.15s; }
.item:hover { border-color: var(--border-hi); }
.item-id { font-family: var(--mono); font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 4px; }
.item-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

/* item body */
.item-body { color: var(--text-dim); font-size: 14px; }
.item-body b, .item-body strong { color: var(--text); font-weight: 600; }
.item-body p { margin-bottom: 8px; }
.item-body p:last-child { margin-bottom: 0; }
.item-body code { background: var(--bg-elev-2); padding: 2px 5px; border-radius: 3px; font-family: var(--mono); font-size: 12.5px; color: var(--text); }
.item-body pre { background: var(--bg-elev-2); padding: 12px; border-radius: 6px; margin: 8px 0; overflow-x: auto; font-family: var(--mono); font-size: 12px; line-height: 1.5; border: 1px solid var(--border); }
.item-body ul, .item-body ol { margin-left: 20px; margin-top: 6px; margin-bottom: 6px; }
.item-body li { margin-bottom: 4px; }
.item-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12.5px; }
.item-body th, .item-body td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
.item-body th { background: var(--bg-elev-2); font-weight: 600; }

/* details (how-to expandable) */
.item-body details { margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-elev-2); }
.item-body details summary { padding: 9px 14px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--info-clr); list-style: none; user-select: none; }
.item-body details summary::-webkit-details-marker { display: none; }
.item-body details summary::before { content: '▶ '; font-size: 10px; }
.item-body details[open] summary::before { content: '▼ '; }
.item-body details > *:not(summary) { padding: 10px 14px 12px; }

/* glossary */
.item-glossary { margin-top: 14px; border: 1px solid rgba(13,148,136,0.25); border-radius: 8px; padding: 10px 16px; background: rgba(13,148,136,0.04); }
.item-glossary::before { content: '📖 용어 풀이'; display: block; font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--glossary-clr); margin-bottom: 8px; letter-spacing: 0.05em; }
.item-glossary dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; }
.item-glossary dt { font-weight: 700; color: var(--glossary-clr); white-space: nowrap; padding-top: 2px; }
.item-glossary dd { color: var(--text-dim); }

/* depth badge */
.depth-badge { display:inline-block; padding:2px 8px; border-radius:999px; font-family:var(--mono); font-size:11px; font-weight:600; }
.depth-easy   { background: rgba(5,150,105,0.10); color: #047857; }
.depth-middle { background: rgba(79,70,229,0.10); color: #4338ca; }
.depth-hard   { background: rgba(220,38,38,0.10); color: #b91c1c; }

/* toast */
.toast { position: fixed; top: 24px; right: 24px; background: var(--summary-clr); color: #ede9fe; padding: 12px 18px; border-radius: 8px; font-family: var(--mono); font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.2s, transform 0.2s; transform: translateY(-10px); z-index: 200; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 980px) {
  body { grid-template-columns: 1fr; }
  aside { position: static; max-height: none; }
  main { padding: 24px 20px 60px; }
}
</style>
</head>
<body>
<aside>
  <h2>Sections</h2>
  <ol id="toc"></ol>
  <div class="toggle-all">
    <button id="btn-toggle-all">▼ 전체 접기</button>
  </div>
</aside>
<main>
  <header class="hero">
    <h1>{{TITLE}}</h1>
    <div class="meta">
      <b id="total-count">0</b>개 항목 ·
      <span class="depth-badge depth-{{DEPTH}}">Depth: {{DEPTH}}</span> ·
      <span id="gen-date"></span>
    </div>
  </header>
  <div id="sections"></div>
</main>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY = '{{STORAGE_KEY}}';
/*
 * SECURITY NOTE: EXPLAIN_DATA is authored entirely by the agent (trusted content).
 * Item body HTML is generated markup — no user input is passed through createContextualFragment.
 */
const EXPLAIN_DATA = {{EXPLAIN_DATA}};

function saveToggleState(allOpen) {
  try { localStorage.setItem(STORAGE_KEY + '-expand', allOpen ? '1' : '0'); } catch {}
}

function loadToggleState() {
  try { return localStorage.getItem(STORAGE_KEY + '-expand') !== '0'; } catch { return true; }
}

function renderGlossary(glossary) {
  if (!glossary || !glossary.length) return null;
  const div = document.createElement('div');
  div.className = 'item-glossary';
  const dl = document.createElement('dl');
  glossary.forEach(({ term, desc }) => {
    const dt = document.createElement('dt');
    dt.textContent = term;
    const dd = document.createElement('dd');
    dd.textContent = desc;
    dl.append(dt, dd);
  });
  div.appendChild(dl);
  return div;
}

function renderItem(item) {
  const div = document.createElement('div');
  div.className = 'item';
  div.dataset.id = item.id;

  const idSpan = document.createElement('span');
  idSpan.className = 'item-id';
  idSpan.textContent = item.id;

  const titleDiv = document.createElement('div');
  titleDiv.className = 'item-title';
  titleDiv.textContent = item.title;

  /* body: agent-authored HTML rendered via createContextualFragment (no script execution) */
  const body = document.createElement('div');
  body.className = 'item-body';
  const range = document.createRange();
  range.selectNodeContents(body);
  body.appendChild(range.createContextualFragment(item.body));

  div.append(idSpan, titleDiv, body);

  const glossaryEl = renderGlossary(item.glossary);
  if (glossaryEl) div.appendChild(glossaryEl);

  return div;
}

function renderSections() {
  const container = document.getElementById('sections');
  let total = 0;
  EXPLAIN_DATA.forEach(sec => {
    const secEl = document.createElement('section');
    secEl.className = 's';
    secEl.id = sec.id;

    const h2 = document.createElement('h2');
    h2.textContent = sec.title;
    secEl.appendChild(h2);

    if (sec.summary) {
      const sumEl = document.createElement('div');
      sumEl.className = 'sec-summary';
      sumEl.textContent = sec.summary;
      secEl.appendChild(sumEl);
    }

    sec.items.forEach(item => { total++; secEl.appendChild(renderItem(item)); });
    container.appendChild(secEl);
  });
  document.getElementById('total-count').textContent = total;
}

function renderTOC() {
  const toc = document.getElementById('toc');
  EXPLAIN_DATA.forEach(sec => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + sec.id;
    a.textContent = sec.title;
    li.appendChild(a);
    toc.appendChild(li);
  });
}

function attachEvents() {
  /* TOC highlight via IntersectionObserver */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting)
        document.querySelectorAll('#toc a').forEach(a => a.classList.toggle('current', a.getAttribute('href') === '#' + e.target.id));
    });
  }, { threshold: 0.2 });
  document.querySelectorAll('section.s').forEach(s => observer.observe(s));

  /* expand / collapse all <details> */
  const btn = document.getElementById('btn-toggle-all');
  let allOpen = loadToggleState();

  function applyToggle() {
    document.querySelectorAll('.item-body details').forEach(d => { d.open = allOpen; });
    btn.textContent = allOpen ? '▼ 전체 접기' : '▶ 전체 펼치기';
    saveToggleState(allOpen);
  }

  btn.addEventListener('click', () => { allOpen = !allOpen; applyToggle(); });

  /* apply saved state after render */
  applyToggle();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('gen-date').textContent = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' }) + ' 생성';

renderTOC();
renderSections();
attachEvents();
</script>
</body>
</html>
